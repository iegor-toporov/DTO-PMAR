server:
    bind:
        host: 0.0.0.0  # listening address for incoming connections
        port: 5001  # listening port for incoming connections
    url: http://localhost:5001/  # url of server
    mimetype: application/json; charset=UTF-8  # default MIME type
    encoding: utf-8  # default server encoding
    language: en-US  # default server language
    gzip: false  # default server config to gzip/compress responses to requests with gzip in the Accept-Encoding header
    cors: true  # boolean on whether server should support CORS
    pretty_print: true  # whether JSON responses should be pretty-printed
    admin: false  # whether to enable the Admin API

  # server limits on number of items to return.
  # overridable when redefined in resource level configuration
    limits:
        default_items: 50
        max_items: 1000
        max_distance_x: 25
        max_distance_y: 25
        max_distance_units: m
        on_exceed: throttle  # throttle or error (default=throttle)

  # leaflet map setup for HTML template rendering
    map:
        url: https://tile.openstreetmap.org/{z}/{x}/{y}.png
        attribution: '&copy; <a href="https://openstreetmap.org/copyright">OpenStreetMap contributors</a>'

  # optional OGC API - Processes asynchronous job management configuration
    manager:
        name: worker.manager.CeleryManager
        connection: null
        output_dir: /tmp/


logging:
    level: WARNING

metadata:
    identification:
        title: Tools4MSP-PMAR
        description: A DTO web application for on-demand anthropogenic pressure modelling and assessment based on the PMAR package.
        keywords:
            - DTO
            - PMAR
        keywords_type: theme  # keyword type as per the ISO 19115 MD_KeywordTypeCode codelist. Accepted values are discipline, temporal, place, theme, stratum
        terms_of_service: https://creativecommons.org/licenses/by/4.0/
        url: https://example.org  # informative URL about the service
    license:  # licensing details
        name: CC-BY 4.0 license
        url: https://creativecommons.org/licenses/by/4.0/
    provider:  # service provider details
        name: Tools4MSP
        url: https://pygeoapi.io
    contact:  # service contact details
        name: Toporov, Iegor
        position: Intern
        address:  Arsenale Castello, 2737/F, 30122
        city: Venezia
        stateorprovince: Veneto
        postalcode: 30122
        country: Italia
        phone: --
        url: --
        hours: --
        instructions: During hours of service. Off on weekends.

resources:

    opendrift:
      type: process
      processor:
            name: processes.OpenDriftProcess.OpenDriftProcessor

    pmar:
      type: process
      processor:
            name: processes.PMARProcess.PMARProcessor

    windfarms:
      type: process
      processor:
            name: processes.WindfarmsProcess.WindfarmsProcessor

    offshore_installations:
      type: process
      processor:
            name: processes.OffshoreInstallationsProcess.OffshoreInstallationsProcessor

    natura2000:
      type: process
      processor:
            name: processes.Natura2000Process.Natura2000Processor

    precompute:
      type: process
      processor:
            name: processes.PrecomputeProcess.PrecomputeProcessor

    scenario_status:
      type: process
      processor:
            name: processes.ScenarioStatusProcess.ScenarioStatusProcessor